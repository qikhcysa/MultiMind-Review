# 系统配置 / System Settings Configuration
llm:
  model: gpt-4o-mini
  temperature: 0.1
  max_tokens: 2048
  # Use environment variable OPENAI_API_KEY for authentication

embedding:
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  batch_size: 32
  normalize: true

vector_store:
  product_collection: products
  review_collection: reviews
  top_k: 5
  similarity_threshold: 0.5

clustering:
  algorithm: dbscan
  eps: 0.3
  min_samples: 2
  min_cluster_size: 2
  max_cluster_summary_samples: 10

pipeline:
  max_dimensions_per_review: 6
  evidence_top_k: 3
  score_range:
    min: 1
    max: 5

audit:
  enabled: true
  log_dir: ./audit_logs
  retention_days: 30
